<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم - ثانوية الشيخ عبدالرحمن بن سعدي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    background: radial-gradient(circle at top, #08224f 0%, #000814 65%);
    font-family:"Cairo",sans-serif;
    color:white;
    overflow:hidden;
}

/* زر العودة */
.back-btn{
    position:absolute;
    top:20px;
    right:20px;
    background:#ffd700;
    color:#000;
    border:none;
    padding:10px 18px;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 0 14px rgba(255,215,0,0.6);
}
.back-btn:hover{
    box-shadow:0 0 22px rgba(255,215,0,0.9);
}

/* العنوان */
header{
    text-align:center;
    margin-top:30px;
}
header h1{
    font-size:2.6rem;
    color:#ffd700;
    text-shadow:0 0 18px rgba(255,215,0,0.8);
    margin:0;
}
header h2{
    margin-top:6px;
    font-size:1.2rem;
    color:#ffeb99;
}

/* الحاوية */
.main{
    height:calc(100vh - 180px);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* كرت الفيديو */
.video-card{
    width:70%;
    max-width:900px;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,215,0,0.45);
    border-radius:22px;
    padding:18px;
    box-shadow:0 0 28px rgba(255,215,0,0.35);
}

/* عنوان المقطع */
.video-title{
    font-size:1.2rem;
    color:#ffeb99;
    margin-bottom:10px;
    text-align:center;
}

/* الفيديو */
video{
    width:100%;
    height:420px;
    background:#000;
    border-radius:16px;
}

/* تلميح */
.hint{
    margin-top:10px;
    text-align:center;
    font-size:0.9rem;
    color:#d7c78a;
}

footer{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
    font-size:0.85rem;
    color:#ffd700;
    opacity:0.8;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goHome()">🏠 الصفحة الرئيسية</button>

<header>
    <h1>القرآن الكريم</h1>
    <h2>ثانوية الشيخ عبدالرحمن بن سعدي</h2>
</header>

<div class="main">
    <div class="video-card">
        <div class="video-title" id="videoTitle">اختر مقطعًا للتلاوة</div>
        <video id="quranPlayer" controls></video>
        <div class="hint">🔸 بعد انتهاء التلاوة سيتم الرجوع تلقائيًا إلى الصفحة الرئيسية</div>
    </div>
</div>

<footer>
© إعداد الأستاذ ماجد صالح الناصر
</footer>

<script>
/* جلب مقاطع القرآن من التخزين */
function getQuranItems(){
    try{
        return JSON.parse(localStorage.getItem("items_quran") || "[]");
    }catch(e){ return []; }
}

const player = document.getElementById("quranPlayer");
const titleBox = document.getElementById("videoTitle");

/* تشغيل أول مقطع تلقائيًا عند الدخول (اختياري – يمكنك حذفه) */
window.addEventListener("DOMContentLoaded", ()=>{
    const items = getQuranItems();
    if(items.length){
        playItem(0);
    }
});

/* تشغيل مقطع */
function playItem(i){
    const items = getQuranItems();
    if(!items[i]) return;

    player.src = "videos/quran/" + items[i].filename;
    titleBox.textContent = items[i].name;
}

/* عند انتهاء الفيديو */
player.addEventListener("ended", ()=>{
    setTimeout(()=>{
        goHome();
    }, 1500); // مهلة بسيطة للانتقال
});

/* العودة للرئيسية */
function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
