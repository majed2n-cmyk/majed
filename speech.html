<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>كلمة الصباح - ثانوية الشيخ عبدالرحمن بن سعدي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: radial-gradient(circle at center, #0a1448 0%, #000814 100%);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
    }
    h1 {
      color: #ffd700;
      margin-top: 20px;
      text-shadow: 0 0 15px #ffd700;
    }
    a.home {
      display: inline-block;
      margin-top: 10px;
      background: #ffd700;
      color: #000;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: bold;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 2px solid #ffd700;
      border-radius: 15px;
      width: 320px;
      padding: 15px;
      box-shadow: 0 0 15px rgba(255,215,0,0.3);
    }
    audio, video {
      width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }
    footer {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #ccc;
    }
  </style>
</head>
<body>

  <a href="index.html" class="home">🏠 الرئيسية</a>
  <h1>كلمة الصباح</h1>

  <div id="list" class="container"></div>

  <footer>© إعداد الأستاذ ماجد صالح الناصر</footer>

  <script>
    const items = JSON.parse(localStorage.getItem("items_speech") || "[]");
    const list = document.getElementById("list");

    if (items.length === 0) {
      list.innerHTML = "<p>لا توجد كلمات صباح مسجلة حاليًا.</p>";
    } else {
      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        const src = "videos/speech/" + item.filename;
        const isVideo = item.type.startsWith("video");
        card.innerHTML = `
          <h3>${item.name}</h3>
          ${isVideo
            ? `<video src="${src}" controls></video>`
            : `<audio src="${src}" controls></audio>`}
        `;
        list.appendChild(card);
      });
    }
  </script>

</body>
</html>
